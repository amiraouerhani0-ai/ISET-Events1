<!-- forgot-password.component.html -->
<div class="forgot-container">
  <div class="forgot-card">
    <div class="logo-section">
      <h1 class="app-title">ISET-Events</h1>
      <p class="app-subtitle">Réinitialiser votre mot de passe</p>
    </div>

    <div class="welcome-section">
      <h2 class="welcome-title">MOT DE PASSE OUBLIÉ</h2>
      <p class="welcome-message">ENTREZ VOTRE EMAIL POUR RÉINITIALISER VOTRE MOT DE PASSE !</p>
    </div>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="forgot-form">
      <div class="form-group">
        <label for="email" class="form-label">Email :</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          class="form-control"
          placeholder="nom@exemple.com"
          [class.is-invalid]="email?.invalid && email?.touched"
        />
        <div *ngIf="email?.invalid && email?.touched" class="invalid-feedback">
          <span *ngIf="email?.errors?.['required']">L'email est requis.</span>
          <span *ngIf="email?.errors?.['email']">Veuillez saisir une adresse email valide.</span>
        </div>
      </div>

      <button type="submit" class="btn-reset" [disabled]="forgotForm.invalid || isLoading">
        <span *ngIf="isLoading" class="spinner"></span>
        <span *ngIf="!isLoading">Réinitialiser le mot de passe</span>
      </button>

      <div class="back-link">
        <a routerLink="/login">Retour à la connexion</a>
      </div>

      <div *ngIf="successMessage" class="success-message">
        {{ successMessage }}
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>
    </form>
  </div>
</div>
